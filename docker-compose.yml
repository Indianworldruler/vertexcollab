services:

  mongodb:
    image: mongo:6.0
    container_name: vertexcollab-mongo
    restart: unless-stopped
    ports:
      - '27017:27017'
    volumes:
      - mongo_data:/data/db
    networks:
      - vertexcollab-network

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: vertexcollab-backend
    restart: unless-stopped
    ports:
      - '5001:5000'
    environment:
      - PORT=5000
      - MONGO_URI=mongodb://mongodb:27017/vertexcollab
      - JWT_SECRET=vertexcollab_jwt_secret_change_in_production
      - NODE_ENV=production
    depends_on:
      - mongodb
    networks:
      - vertexcollab-network

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: vertexcollab-frontend
    restart: unless-stopped
    ports:
      - '3000:3000'
    environment:
      - VITE_API_URL=http://localhost:5001
    depends_on:
      - backend
    networks:
      - vertexcollab-network

volumes:
  mongo_data:
    driver: local

networks:
  vertexcollab-network:
    driver: bridge