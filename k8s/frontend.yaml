apiVersion: apps/v1
kind: Deployment
metadata:
  name: vertexcollab-frontend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: vertexcollab-frontend
  template:
    metadata:
      labels:
        app: vertexcollab-frontend
    spec:
      containers:
        - name: frontend
          image: vertexcollab-frontend:latest
          imagePullPolicy: Never
          ports:
            - containerPort: 3000
---
apiVersion: v1
kind: Service
metadata:
  name: frontend-service
spec:
  selector:
    app: vertexcollab-frontend
  ports:
    - port: 3000
      targetPort: 3000
      nodePort: 30080
  type: NodePort
